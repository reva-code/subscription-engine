server.port=8082
spring.application.name=party-role-service
server.servlet.context-path=/tmf-api/partyManagement/v4

# Zero-Config H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:jio_party;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

jwt.secret=${JWT_SECRET:jio-dev-jwt-secret-key-for-party-role-svc}

server.port=8082
spring.application.name=party-role-service
server.servlet.context-path=/tmf-api/partyManagement/v4

spring.datasource.url=jdbc:mariadb://localhost:3306/jio_party
spring.datasource.username=jio
spring.datasource.password=jio123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

jwt.secret=${JWT_SECRET:jio-dev-jwt-secret-key-for-party-role-svc}

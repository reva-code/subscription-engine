server:
  port: 8086

spring:
  application:
    name: payment-gateway-adapter
  datasource:
    url: jdbc:h2:mem:jio_payment;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

payment:
  gateway:
    provider: razorpay # Configured provider (razorpay or mock)
    razorpay:
      key-id: rzp_test_mockkeyid
      key-secret: mockkeysecret
      webhook-secret: mockrazorpaywebhook

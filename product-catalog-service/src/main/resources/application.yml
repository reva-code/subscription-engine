spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/jio_product_catalog
    username: catalog_user
    password: catalog123
    driver-class-name: org.mariadb.jdbc.Driver

    hikari:
      pool-name: ProductCatalogPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8081
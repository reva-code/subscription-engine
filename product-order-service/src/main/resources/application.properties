# ── Server ────────────────────────────────────────────────────────────────────

# Port this service listens on.
server.port=8080

# Prepends this prefix to every route in the application.
# POST /productOrder becomes POST /tmf-api/productOrderingManagement/v4/productOrder
# No Java files need to change — Spring Boot applies this globally at startup.
server.servlet.context-path=/tmf-api/productOrderingManagement/v4


# ── DataSource ────────────────────────────────────────────────────────────────

# JDBC connection string for MariaDB.
# Format: jdbc:mariadb://<host>:<port>/<schema>
# Schema "jio_product_order" will be created manually in MariaDB before first run.
# Zero-Config H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:jio_product_order;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# ── JPA / Hibernate ───────────────────────────────────────────────────────────

# "update" — Hibernate reads your @Entity classes on startup and creates or
# updates tables to match. It never drops existing tables or data.
# Use "validate" or "none" in production (managed by Flyway instead).
spring.jpa.hibernate.ddl-auto=update

# Prints every SQL statement Hibernate executes to the console.
# Useful during development to confirm INSERT / SELECT / UPDATE are correct.
# Set to false before production.
spring.jpa.show-sql=true

# Formats the printed SQL so it is readable (indented, one clause per line).
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate the exact SQL dialect to use when generating queries for MariaDB.
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect


# ── Swagger UI ────────────────────────────────────────────────────────────────

# These two lines tell SpringDoc where to serve Swagger UI and the raw OpenAPI JSON
# relative to the context-path set above.
#
# Swagger UI will be available at:
#   http://localhost:8080/tmf-api/productOrderingManagement/v4/swagger-ui.html
#
# Raw OpenAPI JSON will be at:
#   http://localhost:8080/tmf-api/productOrderingManagement/v4/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

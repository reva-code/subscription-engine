spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/jio_product_usage?createDatabaseIfNotExist=true
    username: root
    password: mariadb
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

jio:
  integration:
    tmf637:
      base-url: http://localhost:8084/tmf-api/productInventoryManagement/v4
    tmf620:
      base-url: http://localhost:8081/tmf-api/productCatalogManagement/v4
